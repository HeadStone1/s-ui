services:
  s-ui:
    image: ghcr.io/headstone1/s-ui
    container_name: s-ui
    hostname: "s-ui"
    ports:
      - "2095:2095"
      - "2096:2096"
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
    read_only: true
    tmpfs:
      - /tmp
    tty: true
    restart: unless-stopped
    entrypoint: "./entrypoint.sh"
