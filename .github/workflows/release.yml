name: Release S-UI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v1.4.1"
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "25"

jobs:
  build-linux-amd64:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend assets
        run: |
          rm -rf web/html
          mkdir -p web/html
          cp -r frontend/dist/. web/html/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build backend
        run: |
          go build -ldflags="-w -s" -o sui main.go

      - name: Package release archive
        run: |
          mkdir -p s-ui
          cp sui s-ui/
          cp s-ui.service s-ui/
          cp s-ui.sh s-ui/
          tar -zcvf s-ui-linux-amd64.tar.gz s-ui

      - name: Generate SHA256 checksums
        run: |
          sha256sum s-ui-linux-amd64.tar.gz > sha256sums.txt

      - name: Resolve release tag
        id: vars
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=v$TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: s-ui ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            s-ui-linux-amd64.tar.gz
            sha256sums.txt
